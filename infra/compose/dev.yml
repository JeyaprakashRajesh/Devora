version: '3.9'

services:
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devora_auth
      POSTGRES_USER: devora
      POSTGRES_PASSWORD: devora_dev
    ports: ['5432:5432']
    volumes: ['postgres_auth:/var/lib/postgresql/data']

  postgres-project:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devora_project
      POSTGRES_USER: devora
      POSTGRES_PASSWORD: devora_dev
    ports: ['5433:5432']
    volumes: ['postgres_project:/var/lib/postgresql/data']

  postgres-chat:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devora_chat
      POSTGRES_USER: devora
      POSTGRES_PASSWORD: devora_dev
    ports: ['5434:5432']
    volumes: ['postgres_chat:/var/lib/postgresql/data']

  postgres-deploy:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devora_deploy
      POSTGRES_USER: devora
      POSTGRES_PASSWORD: devora_dev
    ports: ['5435:5432']
    volumes: ['postgres_deploy:/var/lib/postgresql/data']

  postgres-sandbox:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devora_sandbox
      POSTGRES_USER: devora
      POSTGRES_PASSWORD: devora_dev
    ports: ['5436:5432']
    volumes: ['postgres_sandbox:/var/lib/postgresql/data']

  postgres-notify:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devora_notify
      POSTGRES_USER: devora
      POSTGRES_PASSWORD: devora_dev
    ports: ['5437:5432']
    volumes: ['postgres_notify:/var/lib/postgresql/data']

  postgres-monitor:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devora_monitor
      POSTGRES_USER: devora
      POSTGRES_PASSWORD: devora_dev
    ports: ['5438:5432']
    volumes: ['postgres_monitor:/var/lib/postgresql/data']

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    volumes: ['redis_data:/data']

  nats:
    image: nats:2.10-alpine
    ports:
      - '4222:4222'
      - '8222:8222'
    command: ['--http_port', '8222', '--jetstream']

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: devora
      MINIO_ROOT_PASSWORD: devora_dev_secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes: ['minio_data:/data']

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - '8123:8123'
      - '9002:9000'
    volumes: ['clickhouse_data:/var/lib/clickhouse']

volumes:
  postgres_auth:
  postgres_project:
  postgres_chat:
  postgres_deploy:
  postgres_sandbox:
  postgres_notify:
  postgres_monitor:
  redis_data:
  minio_data:
  clickhouse_data:
