version: '3.9'
services:
  storage:
    build: ./storage
    environment:
      POSTGRES_DB: devora
      POSTGRES_USER: devora
      POSTGRES_PASSWORD: devora_secret
    ports: ['5432:5432']
    volumes: [pg_data:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devora']
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports: ['4000:4000']
    environment:
      DATABASE_URL: postgres://devora:devora_secret@storage:5432/devora?sslmode=disable
      JWT_SECRET: change_this_min_32_chars_in_production
      PORT: "4000"
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://backend:4000
      GITEA_URL: http://gitea:3001
      GITEA_ADMIN_USER: devora_admin
      GITEA_ADMIN_PASSWORD: devora_admin_secret
      WEBHOOK_SECRET: devora_webhook_secret_change_in_prod
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      storage:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports: ['3000:3000']
    depends_on: [backend]

  postgres-gitea:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: devora
      POSTGRES_PASSWORD: devora_secret
    volumes:
      - pg_gitea:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devora']
      interval: 5s
      retries: 5

  gitea:
    image: gitea/gitea:1.21
    entrypoint: >
      sh -c "
        /usr/bin/entrypoint &
        sleep 10 &&
        gitea admin user create
          --username devora_admin
          --password devora_admin_secret
          --email admin@devora.local
          --admin
          --must-change-password=false
          2>/dev/null || true &&
        wait
      "
    environment:
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres-gitea:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: devora
      GITEA__database__PASSWD: devora_secret
      GITEA__server__HTTP_PORT: "3001"
      GITEA__server__ROOT_URL: http://localhost:3001
      GITEA__server__DOMAIN: localhost
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__admin__DEFAULT_EMAIL_NOTIFICATIONS: disabled
    ports:
      - '3001:3001'
    volumes:
      - gitea_data:/data
    depends_on:
      postgres-gitea:
        condition: service_healthy

volumes:
  pg_data:
  pg_gitea:
  gitea_data:
